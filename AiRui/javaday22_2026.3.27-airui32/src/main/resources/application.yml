server:
  port: 80
  servlet:
    context-path: /api
spring:
  web:
    resources:
      static-locations: file:D:\Desktop\upload\files
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 100MB

file:
  upload:
    base-path: D:/Desktop/upload/files
    store-image:
      max-size: 2097152
      dir: store-image
      allow-types: image/jpeg,image/png,image/jpg
    dish-image:
      max-size: 1048576
      dir: dish-image
      allow-types: image/jpeg,image/png,image/jpg
    business-license:
      max-size: 1048576
      dir: business-license
      allow-types: image/jpeg,image/png,image/jpg
    rental-contract:
      max-size: 5242880
      dir: rental-contract
      allow-types: application/pdf,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document
